  <main>
    <section class="home" aria-label="Carrusel de imágenes destacadas">

        <img src="FOTOS/AUTOMOVILISMO/foto 1.jpg" class="slide active" alt="">
        <img src="FOTOS/CABALLOS/caballo 1.jpg" class="slide" alt="">
        <img src="FOTOS/CABALLOS/caballo 2.jpg" class="slide" alt="">
        <img src="FOTOS/CLASICOS/AF8A9698.jpg" class="slide" alt="">
        <img src="FOTOS/CLASICOS/clasicos12.jpg" class="slide" alt="">
        <img src="FOTOS/CLASICOS/clasicos13.jpg" class="slide" alt="">
        <img src="FOTOS/CLASICOS/clasicos43.jpg" class="slide" alt="">
        <img src="FOTOS/CLASICOS/clasicos46.jpg" class="slide" alt="">
        <img src="FOTOS/CLASICOS/clasicos64.jpg" class="slide" alt="">
        <img src="FOTOS/CLASICOS/clasicos80.jpg" class="slide" alt="">
        <img src="FOTOS/DEPORTIVOS/9T3A5710-Enhanced-NR.jpg" class="slide" alt="">
        <img src="FOTOS/DEPORTIVOS/deportivos2.jpg" class="slide" alt="">
        <img src="FOTOS/DEPORTIVOS/deportivos14.jpg" class="slide" alt="">

        <img src="FOTOS/DEPORTIVOS/deportivos25.jpg" class="slide" alt="">
        <img src="FOTOS/MOTOCICLISMO/9T3A9289-Enhanced-NR.jpg" class="slide" alt="">
        <img src="FOTOS/MOTOCICLISMO/moto 3.jpg" class="slide" alt="">

      </div>

  <audio id="clickSound" src="click.mp3"></audio>

  <script>
    const slides = document.querySelectorAll(".slide");
    let currentSlide = 0;
    let interval = null;

    function showSlide(index) {
      slides.forEach(slide => slide.classList.remove("active"));
      slides[index].classList.add("active");
    }

    function nextSlide() {
      if (slides.length === 0) return;
      currentSlide = (currentSlide + 1) % slides.length;
      showSlide(currentSlide);
    }

    function startCarousel() {
      if (slides.length === 0) return;
      clearInterval(interval);
      interval = setInterval(nextSlide, 8000);
    }

    startCarousel();

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        clearInterval(interval);
      } else {
        startCarousel();
      }
    });

    document.querySelectorAll("a").forEach(link => {
      link.addEventListener("click", () => {
        const sound = document.getElementById("clickSound");
        if (sound) {
          sound.currentTime = 0;
          sound.play().catch(() => {});
        }
      });
    });
  </script>

</body>
